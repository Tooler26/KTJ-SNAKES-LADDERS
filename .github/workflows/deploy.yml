name: Deploy KTJ Matrix Architecture Live Preview

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository Base
        uses: actions/checkout@v4

      - name: Establish Hosted Web View Distribution Pages Link
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./