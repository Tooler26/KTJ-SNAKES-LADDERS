<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>KTJ SNAKES & LADDERS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Orbitron', sans-serif; background:#000; overflow:hidden; touch-action: none; }
    .neon-text { text-shadow: 0 0 10px #22d3ee, 0 0 30px #c026d3, 0 0 60px #ec4899; }
    .room-card { transition: all 0.4s; background: linear-gradient(145deg, #09090b, #18181b); }
    .room-card:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 0 30px rgba(34, 211, 238, 0.4); }
    .vip { border: 2px solid #facc15; box-shadow: 0 0 40px rgba(250, 204, 21, 0.3); }
    .premium-btn { background: linear-gradient(145deg, #18181b, #27272a); border: 2px solid #22d3ee; }
  </style>
</head>
<body class="text-white select-none">

  <div id="lobby-screen" class="fixed inset-0 overflow-y-auto bg-zinc-950 z-50 p-6 pb-24">
    <div class="max-w-7xl mx-auto">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 mb-12">
        <div>
          <h1 class="text-4xl md:text-5xl font-black neon-text tracking-wider">KTJ SNAKES & LADDERS</h1>
          <p class="text-cyan-400 font-mono tracking-widest text-xs mt-1">NEURAL COMPETITION ARENA</p>
        </div>
        <div class="flex items-center gap-6 self-end sm:self-auto bg-black/40 p-4 rounded-2xl border border-zinc-800">
          <div onclick="window.showProfile()" class="cursor-pointer text-right">
            <p id="username-display" class="font-bold tracking-wide text-sm">THULANI</p>
            <p id="balance" class="text-green-400 font-mono text-xl font-black">$12.50</p>
          </div>
          <button onclick="window.showProfile()" class="premium-btn px-5 py-2.5 rounded-xl text-xs font-bold tracking-widest hover:bg-zinc-800 transition-colors">PROFILE</button>
        </div>
      </div>

      <div class="flex gap-4 mb-8">
        <button onclick="window.setModeFilter('live')" id="btn-filter-live" class="px-6 py-3 border-b-2 border-cyan-400 font-bold tracking-widest text-xs uppercase">Live Matches</button>
        <button onclick="window.setModeFilter('ai')" id="btn-filter-ai" class="px-6 py-3 text-zinc-500 font-bold tracking-widest text-xs uppercase">AI Training Grid</button>
      </div>

      <h2 id="grid-title" class="text-xl font-bold mb-6 text-cyan-400 tracking-widest uppercase">SELECT COMPETITION GRID</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="rooms-grid"></div>
    </div>
  </div>

  <div id="game-screen" class="fixed inset-0 bg-black hidden">
    <canvas id="pixi-canvas" class="absolute inset-0"></canvas>

    <div id="room-info" class="absolute top-4 right-4 z-40 bg-zinc-900/90 border border-cyan-400 px-4 py-2 rounded-2xl text-xs font-mono tracking-widest text-cyan-400">
      ARENA LOCAL MATRIX
    </div>

    <div class="absolute top-4 left-4 z-30 bg-black/80 backdrop-blur-md border border-cyan-400/30 rounded-3xl p-5 min-w-[220px]">
      <div id="turn-indicator" class="text-cyan-400 font-bold mb-3 tracking-widest text-sm uppercase">PROCESSING DATA...</div>
      <div class="flex flex-col gap-2 text-xs tracking-wider" id="players-hud"></div>
    </div>

    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-30 w-full max-w-xs px-4 flex flex-col gap-3">
      <button onclick="window.rollDice()" id="roll-btn" class="w-full py-6 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-3xl text-xl font-bold tracking-widest shadow-[0_0_50px_rgba(34,211,238,0.5)] active:scale-95 transition-transform disabled:opacity-50">
        ROLL DICE
      </button>
      <button onclick="window.exitToLobby()" class="text-center text-zinc-500 text-xs font-mono tracking-widest uppercase hover:text-red-400 transition-colors py-1">
        Terminate Match
      </button>
    </div>
  </div>

  <script type="module">
    import { Application, Container, Graphics, Text, TextStyle } from 'https://cdn.jsdelivr.net/npm/pixi.js@8.1.1/dist/pixi.min.mjs';

    const sounds = {
      dice: new Audio('https://assets.mixkit.co/sfx/preview/2968/2968.wav'),
      ladder: new Audio('https://assets.mixkit.co/sfx/preview/2967/2967.wav'),
      snake: new Audio('https://assets.mixkit.co/sfx/preview/2390/2390.wav'),
      win: new Audio('https://assets.mixkit.co/sfx/preview/2965/2965.wav')
    };
    Object.values(sounds).forEach(s => s.volume = 0.3);

    let pixiApp = null, boardContainer = null;
    let positions = [1, 1, 1, 1];
    let currentPlayer = 0;
    let gameRunning = false;
    let isMoving = false;
    let tileSize, offsetX, offsetY;
    let activeRoomContext = null;
    let currentFilterMode = 'live'; 

    let currentBalance = 12.50;
    const userProfile = { name: "THULANI", vipBadge: true, vipMonthsLeft: 2 };

    const rooms = [
      {id:1, name:"ARENA 1", tier:"LOW", fee:0.50, stake:1.50, players:2, max:4, isAI: false},
      {id:2, name:"ARENA 2", tier:"LOW", fee:0.50, stake:1.50, players:1, max:4, isAI: false},
      {id:3, name:"ARENA 3", tier:"LOW", fee:0.50, stake:1.50, players:4, max:4, isAI: false},
      {id:4, name:"ARENA 4", tier:"MID", fee:0.80, stake:4.20, players:3, max:4, isAI: false},
      {id:5, name:"ARENA 5", tier:"MID", fee:0.80, stake:4.20, players:0, max:4, isAI: false},
      {id:6, name:"ARENA 6", tier:"MID", fee:0.80, stake:4.20, players:2, max:4, isAI: false},
      {id:7, name:"ARENA 7", tier:"HIGH", fee:1.00, stake:9.00, players:1, max:4, isAI: false},
      {id:8, name:"ARENA 8", tier:"HIGH", fee:1.00, stake:9.00, players:3, max:4, isAI: false},
      {id:9, name:"VIP+ MATRIX", tier:"VIP", fee:4.00, stake:66.00, players:2, max:4, special:true, isAI: false},
      {id:10, name:"BOT TRAINING ALPHA", tier:"TRAIN", fee:0.00, stake:0.00, players:1, max:4, isAI: true},
      {id:11, name:"BOT TRAINING OMEGA", tier:"TRAIN", fee:0.00, stake:0.00, players:1, max:4, isAI: true}
    ];

    let players = [];

    const snakes = [{head:80,tail:22},{head:97,tail:57},{head:65,tail:16},{head:92,tail:69},{head:48,tail:10}];
    const ladders = [{b:20,t:38},{b:43,t:78},{b:46,t:54},{b:28,t:84},{b:70,t:91}];
    
    const powerTiles = {
      shields: [15, 45, 74],
      teleports: [25, 62, 88]
    };

    let activeShields = [false, false, false, false];

    async function initPixiBoard() {
      const canvas = document.getElementById('pixi-canvas');
      if (!canvas) return;
      
      pixiApp = new Application();
      await pixiApp.init({ canvas: canvas, backgroundAlpha: 0, resizeTo: window, antialias: true });
      
      boardContainer = new Container();
      pixiApp.stage.addChild(boardContainer);

      calculateMetrics();
      drawArenaGrid();
    }

    function calculateMetrics() {
      const bound = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.72);
      tileSize = Math.floor(bound / 10);
      offsetX = (window.innerWidth - 10 * tileSize) / 2;
      offsetY = (window.innerHeight - 10 * tileSize) / 2 - 10;
    }

    function getGridCoords(num) {
      const idx = num - 1;
      const r = Math.floor(idx / 10);
      const c = idx % 10;
      return {
        x: offsetX + (r % 2 === 0 ? c : 9 - c) * tileSize + tileSize / 2,
        y: offsetY + (9 - r) * tileSize + tileSize / 2
      };
    }

    function drawArenaGrid() {
      if (!boardContainer) return;

      for (let i = 0; i < 100; i++) {
        const tileId = i + 1;
        const p = getGridCoords(tileId);
        const tile = new Graphics();

        let strokeColor = 0x22d3ee;
        let fillColor = 0x0f172a;
        let strokeAlpha = 0.25;

        if (powerTiles.shields.includes(tileId)) {
          strokeColor = 0x3b82f6; 
          fillColor = 0x1e3a8a;
          strokeAlpha = 0.8;
        } else if (powerTiles.teleports.includes(tileId)) {
          strokeColor = 0xeab308; 
          fillColor = 0x713f12;
          strokeAlpha = 0.8;
        }

        tile.roundRect(p.x - tileSize/2 + 2, p.y - tileSize/2 + 2, tileSize - 4, tileSize - 4, 12)
            .fill(fillColor)
            .stroke({ width: 2, color: strokeColor, alpha: strokeAlpha });
        boardContainer.addChild(tile);

        const text = new Text({
          text: tileId.toString(),
          style: new TextStyle({ fontFamily: 'Orbitron', fontSize: tileSize * 0.28, fill: strokeColor })
        });
        text.anchor.set(0.5);
        text.position.set(p.x, p.y);
        boardContainer.addChild(text);
      }

      snakes.forEach(s => {
        const h = getGridCoords(s.head);
        const t = getGridCoords(s.tail);
        const snakeGfx = new Graphics();
        snakeGfx.moveTo(h.x, h.y)
                .quadraticCurveTo((h.x + t.x) / 2 + tileSize, (h.y + t.y) / 2 - tileSize * 0.5, t.x, t.y)
                .stroke({ width: 6, color: 0xef4444, alpha: 0.6 });
        boardContainer.addChild(snakeGfx);
      });

      ladders.forEach(l => {
        const bottom = getGridCoords(l.b);
        const top = getGridCoords(l.t);
        const ladGfx = new Graphics();
        ladGfx.moveTo(bottom.x, bottom.y)
              .lineTo(top.x, top.y)
              .stroke({ width: 8, color: 0x22c55e, alpha: 0.6 });
        boardContainer.addChild(ladGfx);
      });

      players.forEach((p, i) => {
        const pawn = new Graphics();
        pawn.circle(0, 0, tileSize * 0.18)
            .fill({ color: p.color })
            .stroke({ width: 2, color: 0xffffff });
            
        const start = getGridCoords(positions[i]);
        const xOff = (i % 2 === 0 ? -1 : 1) * (tileSize * 0.14);
        const yOff = (i < 2 ? -1 : 1) * (tileSize * 0.14);
        
        pawn.position.set(start.x + xOff, start.y + yOff);
        boardContainer.addChild(pawn);
        p.pawn = pawn;
      });
    }

    function movePawn(idx, newPos) {
      return new Promise(resolve => {
        if (!players[idx] || !players[idx].pawn) return resolve();
        const coords = getGridCoords(newPos);
        const xOff = (idx % 2 === 0 ? -1 : 1) * (tileSize * 0.14);
        const yOff = (idx < 2 ? -1 : 1) * (tileSize * 0.14);

        gsap.to(players[idx].pawn.position, {
          x: coords.x + xOff,
          y: coords.y + yOff,
          duration: 0.7,
          ease: "power2.inOut",
          onComplete: resolve
        });
      });
    }

    function updateHUD() {
      const turnInd = document.getElementById('turn-indicator');
      if (turnInd && players[currentPlayer]) {
        turnInd.textContent = `${players[currentPlayer].name}'S TURN ${players[currentPlayer].isAI ? '(AI)' : ''}`;
      }
      let html = '';
      players.forEach((p, i) => {
        const runningHighlight = i === currentPlayer ? 'border-b border-cyan-400 font-bold' : 'opacity-50';
        const shieldIndicator = activeShields[i] ? '🛡️' : '';
        html += `<div class="flex items-center justify-between ${runningHighlight} pb-1">
                  <span><span style="color:#${p.color.toString(16)}">●</span> ${p.name} ${shieldIndicator}</span>
                  <span class="text-cyan-400 font-mono">(${positions[i].toString().padStart(2, '0')})</span>
                </div>`;
      });
      const hudContainer = document.getElementById('players-hud');
      if (hudContainer) hudContainer.innerHTML = html;
    }

    function spawnFloatingVFX(msg, color = "#22d3ee") {
      const vfxText = document.createElement('div');
      vfxText.style.cssText = `position:absolute; bottom:180px; left:50%; transform:translateX(-50%); font-size:1.5rem; font-weight:900; color:${color}; text-shadow: 0 0 10px ${color}; z-index:100; pointer-events:none; font-family:'Orbitron'; text-align:center; width:100%;`;
      vfxText.textContent = msg;
      document.body.appendChild(vfxText);
      gsap.to(vfxText, { y: -60, opacity: 0, duration: 1.5, ease: "power2.out", onComplete: () => vfxText.remove() });
    }

    async function executeEngineTurnLogic() {
      if (!gameRunning) return;
      
      const active = players[currentPlayer];
      isMoving = true;
      const rollBtn = document.getElementById('roll-btn');
      if (rollBtn) rollBtn.disabled = true;

      try { sounds.dice.play(); } catch(e) {}
      const roll = Math.floor(Math.random() * 6) + 1;

      spawnFloatingVFX(`${active.name} ROLLED: ${roll}`);

      positions[currentPlayer] = Math.min(100, positions[currentPlayer] + roll);
      await movePawn(currentPlayer, positions[currentPlayer]);

      let currentTile = positions[currentPlayer];

      if (powerTiles.shields.includes(currentTile)) {
        if (!activeShields[currentPlayer]) {
          activeShields[currentPlayer] = true;
          spawnFloatingVFX(`🛡️ SHIELD MATRIX ACTIVATED!`, "#3b82f6");
        }
      } else if (powerTiles.teleports.includes(currentTile)) {
        spawnFloatingVFX(`🌀 QUANTUM WARP DETECTED!`, "#eab308");
        positions[currentPlayer] = Math.min(100, positions[currentPlayer] + 5);
        await movePawn(currentPlayer, positions[currentPlayer]);
        currentTile = positions[currentPlayer];
      }

      const snake = snakes.find(s => s.head === currentTile);
      if (snake) {
        if (activeShields[currentPlayer]) {
          activeShields[currentPlayer] = false; 
          spawnFloatingVFX(`🛡️ SNAKE DEFLECTED!`, "#3b82f6");
        } else {
          try { sounds.snake.play(); } catch(e) {}
          spawnFloatingVFX(`🚨 HAZARD INTERCEPT: FALLBACK TRACE`, "#ef4444");
          positions[currentPlayer] = snake.tail;
          await movePawn(currentPlayer, positions[currentPlayer]);
        }
      }

      const ladder = ladders.find(l => l.b === currentTile);
      if (ladder) {
        try { sounds.ladder.play(); } catch(e) {}
        spawnFloatingVFX(`📈 VECTOR BOOST INTERRUPT`, "#22c55e");
        positions[currentPlayer] = ladder.t;
        await movePawn(currentPlayer, positions[currentPlayer]);
      }

      if (positions[currentPlayer] === 100) {
        try { sounds.win.play(); } catch(e) {}
        alert(`${active.name} CLAIMS THE ARENA MATRIX PRIZE! 🏆`);
        
        if (!active.isAI && activeRoomContext.fee > 0) {
          currentBalance += (activeRoomContext.stake);
          window.updateBalance();
        }
        window.exitToLobby();
        return;
      }

      currentPlayer = (currentPlayer + 1) % 4;
      updateHUD();
      
      isMoving = false;
      if (rollBtn && !players[currentPlayer].isAI) rollBtn.disabled = false;

      if (gameRunning && players[currentPlayer].isAI) {
        setTimeout(executeEngineTurnLogic, 1200);
      }
    }

    // --- Global Interface Binding Layer ---
    window.setModeFilter = (mode) => {
      currentFilterMode = mode;
      const liveBtn = document.getElementById('btn-filter-live');
      const aiBtn = document.getElementById('btn-filter-ai');
      
      if (mode === 'live') {
        liveBtn.className = "px-6 py-3 border-b-2 border-cyan-400 font-bold tracking-widest text-xs uppercase";
        aiBtn.className = "px-6 py-3 text-zinc-500 font-bold tracking-widest text-xs uppercase";
      } else {
        aiBtn.className = "px-6 py-3 border-b-2 border-purple-400 font-bold tracking-widest text-xs uppercase";
        liveBtn.className = "px-6 py-3 text-zinc-500 font-bold tracking-widest text-xs uppercase";
      }
      window.createLobby();
    };

    window.createLobby = () => {
      const grid = document.getElementById('rooms-grid');
      if (!grid) return;
      grid.innerHTML = '';

      const filtered = rooms.filter(r => currentFilterMode === 'live' ? !r.isAI : r.isAI);

      filtered.forEach(room => {
        const card = document.createElement('div');
        card.className = `room-card rounded-3xl p-6 border border-zinc-800 cursor-pointer flex flex-col justify-between h-64 ${room.special ? 'vip' : ''}`;
        card.innerHTML = `
          <div>
            <div class="flex justify-between items-start">
              <div>
                <h3 class="text-xl font-bold font-mono tracking-wider ${room.special ? 'text-yellow-400' : 'text-white'}">${room.name}</h3>
                <p class="text-xs font-semibold text-cyan-400 mt-0.5 tracking-widest">${room.tier} RISK TIER</p>
              </div>
              ${room.special ? '<span class="text-yellow-400 text-lg">👑</span>' : ''}
            </div>
            <div class="mt-6 space-y-1.5 text-xs font-mono tracking-wide text-zinc-400">
              <div class="flex justify-between"><span>ENTRY FEE:</span><span class="text-green-400 font-bold">$${room.fee.toFixed(2)}</span></div>
              <div class="flex justify-between"><span>ROOM POOL:</span><span class="text-green-400 font-bold">$${room.stake.toFixed(2)}</span></div>
              <div class="flex justify-between"><span>CAPACITY:</span><span class="text-white">${room.players}/${room.max}</span></div>
            </div>
          </div>
          ${room.players === 4 ? '<div class="text-center text-red-400 text-xs font-bold tracking-widest animate-pulse pt-2 border-t border-zinc-900">SIMULATION LOCKED</div>' : '<div class="text-center text-cyan-400 text-xs font-bold font-mono tracking-widest uppercase bg-cyan-950/40 py-2 rounded-xl border border-cyan-800/30">INITIALIZE MATRIX</div>'}
        `;
        card.onclick = () => window.enterRoom(room);
        grid.appendChild(card);
      });
    };

    window.enterRoom = (room) => {
      if (room.players === 4) {
        alert("CRITICAL ERROR: MAXIMUM RUNTIME INSTANCES EXCEEDED FOR THIS NODE.");
        return;
      }
      if (currentBalance < room.fee) {
        alert("ACCESS DENIED: INSUFFICIENT ACCOUNT TRANSACTION BALANCES.");
        return;
      }

      currentBalance -= room.fee;
      window.updateBalance();
      activeRoomContext = room;

      document.getElementById('lobby-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      document.getElementById('room-info').innerHTML = `${room.name} • $${room.stake.toFixed(2)} POOL`;

      // Assign matching player sets based on the selected mode
      if (room.isAI) {
        players = [
          { id: 'p1', name: "THULANI", color: 0x3b82f6, isAI: false },
          { id: 'p2', name: "BOT-NEON", color: 0xef4444, isAI: true },
          { id: 'p3', name: "BOT-QUANTUM", color: 0x22c55e, isAI: true },
          { id: 'p4', name: "BOT-VOID", color: 0xa855f7, isAI: true }
        ];
      } else {
        players = [
          { id: 'p1', name: "THULANI", color: 0x3b82f6, isAI: false },
          { id: 'p2', name: "PLAYER_2", color: 0xef4444, isAI: false },
          { id: 'p3', name: "PLAYER_3", color: 0x22c55e, isAI: false },
          { id: 'p4', name: "PLAYER_4", color: 0xa855f7, isAI: false }
        ];
      }

      positions = [1, 1, 1, 1];
      activeShields = [false, false, false, false];
      currentPlayer = 0;
      gameRunning = true;
      isMoving = false;
      
      const rollBtn = document.getElementById('roll-btn');
      if (rollBtn) rollBtn.disabled = false;
      
      updateHUD();
      initPixiBoard();
    };

    window.updateBalance = () => {
      const balEl = document.getElementById('balance');
      if (balEl) balEl.textContent = '$' + currentBalance.toFixed(2);
    };

    window.showProfile = () => {
      alert(`NEURAL SYSTEM USER PROFILE\n-----------------------------\nCodename: ${userProfile.name}\nLiquid Worth: $${currentBalance.toFixed(2)}\nVIP status: ${userProfile.vipBadge ? 'ENABLED' : 'INACTIVE'}`);
    };

    window.rollDice = () => {
      if (isMoving || !gameRunning || players[currentPlayer].isAI) return;
      executeEngineTurnLogic();
    };

    window.exitToLobby = () => {
      gameRunning = false;
      activeRoomContext = null;
      if (pixiApp) {
        pixiApp.destroy(true, { children: true, texture: true, baseTexture: true });
        pixiApp = null;
      }
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('lobby-screen').classList.remove('hidden');
    };

    window.addEventListener('resize', () => {
      if (!gameRunning || !pixiApp) return;
      calculateMetrics();
      if (boardContainer) {
        boardContainer.removeChildren();
        drawArenaGrid();
      }
    });

    // Initialize Runtime Core Lifecycle
    window.createLobby();
    window.updateBalance();
  </script>
</body>
</html>
