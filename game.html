<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>KTJ MATRIX — GAME TERMINAL</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8 select-none bg-[#020205] text-white overflow-hidden h-screen flex flex-col justify-between">

  <header class="w-full max-w-md mx-auto flex justify-between items-center px-1 z-10">
    <div>
      <h2 id="game-username-display" class="text-xs font-bold tracking-widest text-zinc-400 uppercase">OPERATIVE: LOADING...</h2>
      <p id="game-room-display" class="text-[8px] font-mono neon-text-cyan tracking-wider uppercase">NODE INSTANCE: FETCHING...</p>
    </div>
    <div class="text-right">
      <p class="text-[8px] font-mono text-zinc-500 tracking-widest uppercase">STAKE VALUE</p>
      <h3 id="game-stake-display" class="text-xs font-black font-mono neon-text-purple">$0.00</h3>
    </div>
  </header>

  <main class="flex-1 w-full max-w-md mx-auto flex flex-col items-center justify-center relative my-4">
    <div id="dice-canvas-container" class="absolute inset-0 z-0 bg-zinc-950/20 border border-zinc-900/60 rounded-3xl overflow-hidden backdrop-blur-sm"></div>

    <div id="hud-overlay" class="relative z-10 text-center pointer-events-none space-y-2">
      <div id="result-display-box" class="scale-0 opacity-0 bg-black/80 border border-zinc-800/80 px-6 py-3 rounded-2xl backdrop-blur-md shadow-2xl">
        <p class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">TRANSACTION RESULTS Matrix</p>
        <h1 id="dice-value-result" class="text-3xl font-black font-mono tracking-tighter mt-1 text-white">0</h1>
        <p id="payout-notification" class="text-[10px] font-bold uppercase tracking-wider mt-1 text-emerald-400"></p>
      </div>
    </div>
  </main>

  <footer class="w-full max-w-md mx-auto space-y-4 z-10">
    <button id="roll-action-trigger" onclick="window.initiateDicePhysicsEngineLoop()" class="w-full py-4 bg-gradient-to-r from-cyan-500 to-purple-600 rounded-2xl text-xs font-black tracking-widest text-white shadow-xl uppercase transition-all transform active:scale-95 duration-100 disabled:opacity-40 disabled:pointer-events-none">
      INITIALIZE DICE TRANSACTION CORE
    </button>
    
    <div class="grid grid-cols-2 gap-4">
      <button onclick="HardwareEngine.triggerClick(); window.location.href='lobby.html'" class="py-3 bg-zinc-900 border border-zinc-800 rounded-xl text-[10px] font-mono tracking-widest text-zinc-400 hover:text-white uppercase text-center transition-colors">
        Abort to Lobby
      </button>
      <button id="reset-board-btn" onclick="window.resetSimulationState()" class="py-3 bg-zinc-900 border border-zinc-800 rounded-xl text-[10px] font-mono tracking-widest text-zinc-500 uppercase text-center pointer-events-none opacity-30 transition-all">
        Clear Ledger View
      </button>
    </div>
  </footer>

  <script type="module">
    // --- LIVE SUPABASE PRODUCTION CREDENTIALS ACTIVE ---
    const SUPABASE_URL = "https://dafyqzsnogqqcjecssny.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRhZnlxenNub2dxcWNqZWNzc255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMDEzMjMsImV4cCI6MjA5NDY3NzMyM30.T5Grf8yXfnWk0cSidsbjXBUhwhHpuQFh6ZSvsN1yA8k"; 
    
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Read routing string metrics straight from active URL parameter fields
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = parseInt(urlParams.get('room')) || 1;
    const roomCost = parseFloat(urlParams.get('cost')) || 10.00;

    let scene, camera, renderer, diceMesh;
    let currentUser = null;
    let isSimulationRunning = false;

    const HardwareEngine = {
      vibrate: (pattern) => { if ("vibrate" in navigator) navigator.vibrate(pattern); },
      triggerClick: () => { HardwareEngine.vibrate(10); },
      triggerSuccess: () => { HardwareEngine.vibrate([40, 30, 40]); },
      triggerImpact: () => { HardwareEngine.vibrate(25); },
      triggerFailure: () => { HardwareEngine.vibrate([200, 80, 200]); }
    };

    // 3D REAL-TIME MECHANICAL GRAPHICS RE-RENDER FRAMEWORKS
    function init3DGameplayCanvas() {
      const container = document.getElementById('dice-canvas-container');
      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x020205, 0.05);

      camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
      camera.position.set(0, 0, 8);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      // Environment lighting arrays
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      const cyanLight = new THREE.PointLight(0x22d3ee, 3, 30);
      cyanLight.position.set(4, 4, 4);
      scene.add(cyanLight);

      const purpleLight = new THREE.PointLight(0xa855f7, 3, 30);
      purpleLight.position.set(-4, -4, 4);
      scene.add(purpleLight);

      // Build precise geometric representation of a high-fidelity continuous wireframe cube
      const geometry = new THREE.BoxGeometry(2.2, 2.2, 2.2);
      const material = new THREE.MeshPhongMaterial({
        color: 0x09090b,
        emissive: 0x111827,
        specular: 0x22d3ee,
        shininess: 60,
        wireframe: true
      });

      diceMesh = new THREE.Mesh(geometry, material);
      scene.add(diceMesh);

      // Listen for window scale anomalies and update pixel calculations immediately
      window.addEventListener('resize', () => {
        if (!container) return;
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
      });

      renderLoopTick();
    }

    function renderLoopTick() {
      requestAnimationFrame(renderLoopTick);
      if (diceMesh && !isSimulationRunning) {
        diceMesh.rotation.x += 0.003;
        diceMesh.rotation.y += 0.005;
      }
      if (renderer && scene && camera) {
        renderer.render(scene, camera);
      }
    }

    // AUTHENTICATE INTERFACE LAYER DATA HOOKS
    async function verifyOperationalTelemetry() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = user;

      const { data: profile, error } = await supabase
        .from('profiles')
        .select('username, wallet_balance, account_status')
        .eq('id', user.id)
        .single();

      if (error || (profile && profile.account_status === 'banned')) {
        window.location.href = 'index.html';
        return;
      }

      // Map cloud text nodes to screen layout components
      document.getElementById('game-username-display').textContent = `OPERATIVE: ${profile.username}`;
      document.getElementById('game-room-display').textContent = `NODE INSTANCE: ROOM #${roomId}`;
      document.getElementById('game-stake-display').textContent = `$${roomCost.toFixed(2)}`;
    }

    // EXECUTE HARDWARE PHYSICS RUN & TRANSACTION INJECTION
    window.initiateDicePhysicsEngineLoop = async () => {
      if (isSimulationRunning) return;
      HardwareEngine.triggerClick();
      
      const btn = document.getElementById('roll-action-trigger');
      btn.disabled = true;
      btn.textContent = "VERIFYING ACCOUNT STAKE BALANCE...";

      try {
        // 1. Fire deduction ledger pipeline via secure database RPC rules
        const { data: newBalance, error: transactionError } = await supabase.rpc('process_payout_deduction', {
          user_id_param: currentUser.id,
          payout_amount: roomCost
        });

        if (transactionError) throw new Error("Insufficient funds present on ledger.");

        isSimulationRunning = true;
        btn.textContent = "SIMULATING DYNAMICS MATRIX...";

        // Compute simulated numeric randomizer output targets
        const simulatedTargetValue = Math.floor(Math.random() * 6) + 1;
        const isWinnerRound = simulatedTargetValue >= 4; // High stakes: 4, 5, 6 declare immediate victory

        // Generate high-speed velocity parameters for the 3D canvas mesh object
        const spinTimeline = gsap.timeline();
        spinTimeline.to(diceMesh.rotation, {
          x: Math.PI * 8 + (simulatedTargetValue * 0.5),
          y: Math.PI * 10 - (simulatedTargetValue * 0.3),
          z: Math.PI * 4,
          duration: 2.2,
          ease: "back.out(1.2)",
          onUpdate: () => { HardwareEngine.vibrate(4); },
          onComplete: async () => {
            HardwareEngine.triggerImpact();
            isSimulationRunning = false;
            
            let finalOutputString = "";
            let netPayoutPool = 0.00;

            if (isWinnerRound) {
              // Calculate prize output parameters (Double entry stake value minus platform commission)
              const grossPrizePool = roomCost * 2;
              const systemCommissionFee = roomCost * 0.10;
              netPayoutPool = grossPrizePool - systemCommissionFee;

              // 2. Inject allocation metrics straight into server profile rows via cloud ledger RPC
              await supabase.rpc('process_immediate_deposit', {
                user_id_param: currentUser.id,
                deposit_amount: netPayoutPool
              });

              // 3. Document match parameters permanently into system database transaction streams
              await supabase.from('match_history').insert([{
                room_id: roomId,
                entry_fee: roomCost,
                winner_id: currentUser.id,
                platform_commission: systemCommissionFee
              }]);

              HardwareEngine.triggerSuccess();
              document.getElementById('dice-value-result').className = "text-3xl font-black font-mono tracking-tighter mt-1 text-emerald-400 drop-shadow-[0_0_15px_rgba(52,211,153,0.4)]";
              finalOutputString = "STAKE SECURED";
              document.getElementById('payout-notification').textContent = `+$${netPayoutPool.toFixed(2)} ALLOCATED`;
            } else {
              // Document failed round parameters permanently into transaction records
              await supabase.from('match_history').insert([{
                room_id: roomId,
                entry_fee: roomCost,
                winner_id: null,
                platform_commission: roomCost
              }]);

              HardwareEngine.triggerFailure();
              document.getElementById('dice-value-result').className = "text-3xl font-black font-mono tracking-tighter mt-1 text-red-500 drop-shadow-[0_0_15px_rgba(239,68,68,0.4)]";
              finalOutputString = "STAKE LIQUIDATED";
              document.getElementById('payout-notification').textContent = `-$${roomCost.toFixed(2)} REMOVED`;
            }

            // Display tactical HUD metrics over the 3D graphics frame smoothly
            document.getElementById('dice-value-result').textContent = `VALUE: ${simulatedTargetValue} [${finalOutputString}]`;
            
            gsap.fromTo("#result-display-box", 
              { scale: 0.8, opacity: 0 }, 
              { scale: 1, opacity: 1, duration: 0.25, ease: "power2.out" }
            );

            btn.textContent = "TRANSACTION ROUND FINALIZED";
            
            // Activate structural reset controls on dashboard interface
            const resetBtn = document.getElementById('reset-board-btn');
            resetBtn.className = "py-3 bg-zinc-900 border border-zinc-700 rounded-xl text-[10px] font-mono tracking-widest text-white uppercase text-center cursor-pointer active:scale-95 transition-all";
            resetBtn.style.pointerEvents = "auto";
            resetBtn.style.opacity = "1";
          }
        });

      } catch (err) {
        HardwareEngine.triggerFailure();
        alert(`Core Ledger Exception: ${err.message}`);
        btn.disabled = false;
        btn.textContent = "INITIALIZE DICE TRANSACTION CORE";
      }
    };

    window.resetSimulationState = () => {
      HardwareEngine.triggerClick();
      
      gsap.to("#result-display-box", {
        scale: 0.8,
        opacity: 0,
        duration: 0.18,
        onComplete: () => {
          document.getElementById('payout-notification').textContent = "";
          
          const btn = document.getElementById('roll-action-trigger');
          btn.disabled = false;
          btn.textContent = "INITIALIZE DICE TRANSACTION CORE";

          const resetBtn = document.getElementById('reset-board-btn');
          resetBtn.className = "py-3 bg-zinc-900 border border-zinc-800 rounded-xl text-[10px] font-mono tracking-widest text-zinc-500 uppercase text-center pointer-events-none opacity-30 transition-all";
          resetBtn.style.pointerEvents = "none";
          
          verifyOperationalTelemetry();
        }
      });
    };

    window.addEventListener('DOMContentLoaded', () => {
      init3DGameplayCanvas();
      verifyOperationalTelemetry();
    });
  </script>
</body>
</html>
