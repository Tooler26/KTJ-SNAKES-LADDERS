<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>KTJ SNAKES & LADDERS — ARENA LIVE</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    #board-matrix-grid { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); background: rgba(9, 9, 14, 0.9); border: 2px solid #27272a; }
    .tile-node { border: 1px solid rgba(39, 39, 42, 0.2); position: relative; }
    .player-token { width: 14px; height: 14px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }
  </style>
</head>
<body class="p-4 flex flex-col justify-between h-screen max-w-md mx-auto overflow-hidden">

  <header class="w-full flex justify-between items-center bg-zinc-950/80 p-3 border border-zinc-900 rounded-2xl">
    <div>
      <h2 class="text-[10px] font-bold tracking-widest text-zinc-400 uppercase">KTJ MATRIX GAME ARENA</h2>
      <p id="turn-readout" class="text-[9px] font-mono neon-text-cyan uppercase mt-0.5">SYNCHRONIZING TURNS...</p>
    </div>
    <button onclick="window.location.href='lobby.html'" class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-xl text-[9px] font-mono tracking-widest text-zinc-500 uppercase active:scale-95">FORFEIT</button>
  </header>

  <div class="my-4 aspect-square w-full">
    <div id="board-matrix-grid" class="w-full h-full rounded-2xl overflow-hidden p-1 gap-0.5"></div>
  </div>

  <footer class="w-full bg-zinc-950/80 p-4 border border-zinc-900 rounded-3xl text-center space-y-3">
    <div class="flex justify-between items-center px-2">
      <span class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">Tile Location Index: <span id="idx-pos-text" class="text-white font-bold">1</span>/100</span>
      <span class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">Dice Output: <span id="dice-roll-text" class="neon-text-purple font-bold">0</span></span>
    </div>
    <button id="dice-trigger-btn" onclick="window.triggerDiceRollExecution()" class="w-full py-4 bg-gradient-to-r from-cyan-500 to-purple-600 text-xs font-black tracking-widest text-white uppercase rounded-2xl shadow-lg ktj-btn-active">
      CYCLE QUANTUM DICE MATRIX
    </button>
  </footer>

  <script type="module">
    let playerPosition = 1;
    const snakesAndLaddersTelemetryMap = {
      4: 14, 9: 31, 20: 38, 28: 84, 40: 59, 51: 67, 71: 91,
      17: 7, 54: 34, 62: 19, 64: 60, 87: 24, 93: 73, 99: 78
    };

    function renderAestheticBoardNodes() {
      const grid = document.getElementById('board-matrix-grid'); grid.innerHTML = '';
      for (let r = 9; r >= 0; r--) {
        if (r % 2 === 1) { for (let c = 0; c < 10; c++) createNode(r * 10 + c + 1); }
        else { for (let c = 9; c >= 0; c--) createNode(r * 10 + c + 1); }
      }
      refreshPlayerVisualPositions();
    }

    function createNode(num) {
      const grid = document.getElementById('board-matrix-grid'); const div = document.createElement('div');
      div.id = `tile-${num}`; div.className = 'tile-node flex flex-col items-center justify-center font-mono text-[8px] font-bold text-zinc-700 bg-zinc-950/40 rounded-sm';
      div.innerHTML = `<span>${num}</span><div class="token-container flex gap-0.5 mt-0.5"></div>`; grid.appendChild(div);
    }

    window.triggerDiceRollExecution = () => {
      if ("vibrate" in navigator) navigator.vibrate(12);
      const btn = document.getElementById('dice-trigger-btn'); btn.disabled = true;

      const result = Math.floor(Math.random() * 6) + 1;
      document.getElementById('dice-roll-text').textContent = result;
      gsap.fromTo("#dice-roll-text", { scale: 1.5 }, { scale: 1, duration: 0.3 });

      setTimeout(() => {
        let targetPos = playerPosition + result;
        if (targetPos > 100) targetPos = playerPosition; else playerPosition = targetPos;

        if (snakesAndLaddersTelemetryMap[playerPosition]) {
          const old = playerPosition; playerPosition = snakesAndLaddersTelemetryMap[playerPosition];
          setTimeout(() => {
            if (playerPosition > old) {
              if ("vibrate" in navigator) navigator.vibrate([40, 30, 40]);
              gsap.fromTo("#board-matrix-grid", { filter: "brightness(1.6) drop-shadow(0 0 10px #a855f7)" }, { filter: "brightness(1)", duration: 0.4 });
            } else {
              if ("vibrate" in navigator) navigator.vibrate(200);
              gsap.fromTo("#board-matrix-grid", { filter: "brightness(0.4) saturate(2)" }, { filter: "brightness(1)", duration: 0.4 });
            }
            refreshPlayerVisualPositions();
          }, 350);
        }

        if ("vibrate" in navigator) navigator.vibrate(25);
        refreshPlayerVisualPositions();

        if (playerPosition === 100) {
          alert("👑 ARENA NODE SECURED! Winnings dispatched directly into your balance framework.");
          window.location.href = 'lobby.html'; return;
        }
        btn.disabled = false;
      }, 500);
    };

    function refreshPlayerVisualPositions() {
      document.querySelectorAll('.player-token').forEach(t => t.remove());
      const currentCell = document.getElementById(`tile-${playerPosition}`);
      if (currentCell) {
        const token = document.createElement('div'); token.className = 'player-token bg-cyan-400 text-cyan-400';
        currentCell.querySelector('.token-container').appendChild(token);
        document.getElementById('idx-pos-text').textContent = playerPosition;
        gsap.fromTo(token, { scale: 0.2 }, { scale: 1, duration: 0.3, ease: "back.out(1.7)" });
      }
    }

    window.addEventListener('DOMContentLoaded', () => { renderAestheticBoardNodes(); document.getElementById('turn-readout').textContent = "YOUR CHIP ALLOCATION TURN ACTIVE"; });
  </script>
</body>
</html>
