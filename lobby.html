<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>KTJ SNAKES & LADDERS — ACCOUNT HUB</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</body class="p-4 md:p-8">

  <div class="w-full max-w-md mx-auto mb-4 text-center">
    <img src="1000243662.png" alt="KTJ SNAKES & LADDERS" class="w-24 h-auto mx-auto drop-shadow-[0_0_15px_rgba(56,189,248,0.2)] select-none pointer-events-none">
    <h1 class="text-[10px] font-black tracking-widest text-zinc-500 uppercase mt-2">KTJ SNAKES & LADDERS CENTRAL</h1>
  </div>

  <header class="w-full max-w-md mx-auto flex justify-between items-center mb-6 px-2">
    <div>
      <h2 id="display-codename" class="text-xs font-bold tracking-widest neon-text-cyan">OPERATIVE: LINKING...</h2>
      <p class="text-[8px] font-mono text-zinc-500 uppercase tracking-wider">SECURE TRANSACTION PROTOCOL ACTIVE</p>
    </div>
    <div class="text-right">
      <p class="text-[9px] font-mono text-zinc-400 tracking-widest uppercase">WALLET FUNDS</p>
      <h3 class="text-md font-black font-mono neon-text-purple display-wallet-balance">$0.00</h3>
    </div>
  </header>

  <main id="lobby-screen" class="w-full max-w-md mx-auto space-y-6">
    <div class="ktj-card p-6 border-zinc-800 text-center">
      <h3 class="text-xs font-black tracking-widest text-zinc-400 uppercase mb-4">DEPLOYMENT TIERS</h3>
      <div class="space-y-3">
        <div class="border border-cyan-500/30 bg-cyan-950/10 p-4 rounded-xl flex justify-between items-center cursor-pointer">
          <div class="text-left">
            <p class="text-xs font-bold text-white tracking-wide">BRONZE MATRIX NODE</p>
            <p class="text-[9px] font-mono text-zinc-500 uppercase">TIER LEVEL #01 LOBBY</p>
          </div>
          <span class="text-xs font-mono font-bold text-sky-400">$10.00 Entry</span>
        </div>
      </div>
    </div>

    <button id="global-action-cta" class="w-full py-4 text-xs font-black tracking-widest text-white uppercase rounded-2xl bg-zinc-900 border border-zinc-800 transition-all active:scale-95">
      RESOLVING TELEMETRY MATRIX...
    </button>

    <footer class="grid grid-cols-2 gap-4 pt-4 border-t border-zinc-900">
      <button onclick="window.AppRouter.navigateTo('lobby-screen')" class="py-3 ktj-card border-zinc-800 text-[10px] font-mono tracking-widest text-zinc-400 hover:text-white uppercase ktj-btn-active">Dashboard</button>
      <button onclick="window.AppRouter.navigateTo('cashier-screen')" class="py-3 ktj-card border-zinc-800 text-[10px] font-mono tracking-widest text-zinc-400 hover:text-white uppercase ktj-btn-active">Cashier Module</button>
    </footer>
  </main>

  <section id="cashier-screen" class="hidden w-full max-w-md mx-auto ktj-card p-6 border-zinc-800 space-y-6">
    <div class="border-b border-zinc-900 pb-4 text-center">
      <h2 class="text-sm font-bold tracking-widest neon-text-purple uppercase">FINANCIAL OPERATIONS NODE</h2>
      <p class="text-[9px] font-mono text-zinc-500 uppercase mt-1">Instant stacking deposit credits & frictionless automated payouts</p>
    </div>

    <div class="space-y-3">
      <label class="text-[9px] font-mono text-zinc-400 tracking-widest block">QUICK CHIP TOP-UP ACCUMULATION (USD)</label>
      <div class="grid grid-cols-4 gap-2">
        <button onclick="window.selectDepositAmount(this, 10)" class="py-3 bg-zinc-900 border border-zinc-800 rounded-xl font-mono text-xs text-white active:border-cyan-400 transition-all">$10</button>
        <button onclick="window.selectDepositAmount(this, 25)" class="py-3 bg-zinc-900 border border-zinc-800 rounded-xl font-mono text-xs text-white active:border-cyan-400 transition-all">$25</button>
        <button onclick="window.selectDepositAmount(this, 50)" class="py-3 bg-zinc-900 border border-zinc-800 rounded-xl font-mono text-xs text-white active:border-cyan-400 transition-all">$50</button>
        <button onclick="window.selectDepositAmount(this, 100)" class="py-3 bg-zinc-900 border border-zinc-800 rounded-xl font-mono text-xs text-white active:border-cyan-400 transition-all">$100</button>
      </div>
      <input id="deposit-amount-input" type="number" value="25" class="w-full neon-input rounded-xl px-4 py-3 text-xs font-mono mt-2">
      <button onclick="window.executeSimulatedImmediateTopUp()" class="w-full py-4 bg-gradient-to-r from-emerald-500 to-teal-600 text-xs font-black tracking-widest text-white rounded-xl uppercase shadow-lg ktj-btn-active">
        Execute Instant Wallet Top-Up
      </button>
    </div>

    <div class="space-y-3 border-t border-zinc-900 pt-6">
      <label class="text-[9px] font-mono text-zinc-400 tracking-widest block">RAPID AUTOMATED PAYOUT / WITHDRAWAL DISPATCH</label>
      <input id="withdraw-amount-input" type="number" placeholder="Enter payout value ($)" class="w-full neon-input rounded-xl px-4 py-3 text-xs font-mono">
      <input id="withdraw-address-input" type="text" placeholder="Enter target secure crypto destination address" class="w-full neon-input rounded-xl px-4 py-3 text-xs font-mono">
      <button onclick="window.submitInstantWithdrawalRequest()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-indigo-600 text-xs font-black tracking-widest text-white rounded-xl uppercase shadow-lg ktj-btn-active">
        Confirm Frictionless Payout Transfer
      </button>
    </div>

    <button onclick="window.AppRouter.navigateTo('lobby-screen')" class="w-full py-3 bg-zinc-900 text-[10px] font-mono tracking-widest text-zinc-500 uppercase rounded-xl border border-zinc-800 ktj-btn-active">
      Return to Main Dashboard
    </button>
  </section>

  <script type="module">
    const SUPABASE_URL = "https://your-project-id.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; 
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let activeUserSession = null;
    let selectedRoomTierCost = 10.00;
    let selectedActiveRoomId = 1;

    const HardwareEngine = {
      vibrate: (pattern) => { if ("vibrate" in navigator) navigator.vibrate(pattern); },
      triggerClick: () => { HardwareEngine.vibrate(12); },
      triggerSuccess: () => { HardwareEngine.vibrate([40, 30, 40]); },
      triggerLockoutFailure: () => { HardwareEngine.vibrate([150, 50, 150]); }
    };

    window.AppRouter = {
      currentScreenId: 'lobby-screen',
      navigateTo: (targetScreenId) => {
        if (AppRouter.currentScreenId === targetScreenId) return;
        HardwareEngine.triggerClick();
        const curr = document.getElementById(AppRouter.currentScreenId);
        const targ = document.getElementById(targetScreenId);

        gsap.timeline()
          .to(curr, { opacity: 0, y: -8, duration: 0.15, onComplete: () => { curr.classList.add('hidden'); targ.classList.remove('hidden'); }})
          .fromTo(targ, { opacity: 0, y: 8 }, { opacity: 1, y: 0, duration: 0.2, ease: "power2.out" });
        AppRouter.currentScreenId = targetScreenId;
      },

      optimizePrimaryLobbyCTA: (balance) => {
        const cta = document.getElementById('global-action-cta'); if (!cta) return;
        const freshCTA = cta.cloneNode(true); cta.parentNode.replaceChild(freshCTA, cta);

        if (balance <= 0 || balance < selectedRoomTierCost) {
          freshCTA.textContent = "⚠️ INSUFFICIENT FUNDS — TOP UP";
          freshCTA.className = "w-full py-4 bg-gradient-to-r from-amber-500 to-orange-600 rounded-2xl text-xs font-black tracking-widest text-white shadow-lg uppercase transition-all active:scale-95";
          freshCTA.addEventListener('click', () => AppRouter.navigateTo('cashier-screen'));
        } else {
          freshCTA.textContent = "🎮 DEPLOY TO LIVE ARENA MATCH";
          freshCTA.className = "w-full py-4 bg-gradient-to-r from-sky-500 to-purple-600 rounded-2xl text-xs font-black tracking-widest text-white shadow-lg uppercase transition-all active:scale-95";
          freshCTA.addEventListener('click', () => {
            HardwareEngine.triggerSuccess();
            window.location.href = `game.html?room=${selectedActiveRoomId}&cost=${selectedRoomTierCost}`;
          });
        }
      }
    };

    window.selectDepositAmount = (btn, val) => { HardwareEngine.triggerClick(); document.getElementById('deposit-amount-input').value = val; };

    window.executeSimulatedImmediateTopUp = async () => {
      const amt = parseFloat(document.getElementById('deposit-amount-input').value);
      if (!amt || amt <= 0) return;

      const { error } = await supabase.rpc('process_immediate_deposit', { user_id_param: activeUserSession.id, deposit_amount: amt });
      if (error) { HardwareEngine.triggerLockoutFailure(); alert(error.message); return; }
      
      HardwareEngine.triggerSuccess();
      // Establish Supabase database realtime live triggers sync to reflect balances instantly
      setupRealtimeWalletSync(activeUserSession.id);
      pullFreshProfileTelemetry();
    };

    window.submitInstantWithdrawalRequest = async () => {
      const amt = parseFloat(document.getElementById('withdraw-amount-input').value);
      const addr = document.getElementById('withdraw-address-input').value.trim();
      if (!amt || amt <= 0 || !addr) { HardwareEngine.triggerLockoutFailure(); return alert("Validation Error."); }

      const { error } = await supabase.rpc('process_payout_deduction', { user_id_param: activeUserSession.id, payout_amount: amt });
      if (error) { HardwareEngine.triggerLockoutFailure(); return alert(error.message); }

      HardwareEngine.triggerSuccess(); alert("🚀 WITHDRAWAL DISPATCH SUCCESSFUL!"); pullFreshProfileTelemetry();
    };

    function setupRealtimeWalletSync(userId) {
      supabase.channel(`public:profiles:id=eq.${userId}`)
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'profiles', filter: `id=eq.${userId}` }, (payload) => {
          const freshBal = payload.new.wallet_balance;
          document.querySelectorAll('.display-wallet-balance').forEach(el => el.textContent = `$${freshBal.toFixed(2)}`);
          AppRouter.optimizePrimaryLobbyCTA(freshBal);
        }).subscribe();
    }

    async function pullFreshProfileTelemetry() {
      const { data: { user } } = await supabase.auth.getUser(); if (!user) { window.location.href = 'index.html'; return; }
      activeUserSession = user; setupRealtimeWalletSync(user.id);

      const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
      if (profile) {
        document.getElementById('display-codename').textContent = `OPERATIVE: ${profile.username}`;
        document.querySelectorAll('.display-wallet-balance').forEach(el => el.textContent = `$${profile.wallet_balance.toFixed(2)}`);
        AppRouter.optimizePrimaryLobbyCTA(profile.wallet_balance);
      }
    }

    window.addEventListener('DOMContentLoaded', () => { pullFreshProfileTelemetry(); });
  </script>
</body>
</html>
